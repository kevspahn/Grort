name: Deploy Grort

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ghcr.io/kevspahn/grort:latest .

      - name: Save image as tarball
        run: docker save ghcr.io/kevspahn/grort:latest | gzip > grort.tar.gz

      - name: Copy image to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: grort.tar.gz
          target: /tmp/

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker load < /tmp/grort.tar.gz
            rm /tmp/grort.tar.gz
            cd ~/spahndigital
            docker compose up -d grort
